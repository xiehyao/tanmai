<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>探脉 管理后台</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: #121b2f;
        --text: #e6edf3;
        --muted: #a5b4c7;
        --primary: #4f8cff;
        --danger: #ff5c7a;
        --border: rgba(255, 255, 255, 0.12);
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      }
      .wrap {
        width: 100%;
        max-width: none;
        margin: 16px auto;
        padding: 0 12px;
        box-sizing: border-box;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      .row + .row {
        margin-top: 10px;
      }
      label {
        color: var(--muted);
        font-size: 12px;
      }
      input,
      textarea,
      select {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        outline: none;
        min-height: 38px;
      }
      textarea {
        min-height: 90px;
        width: 100%;
        resize: vertical;
      }
      .btn {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        font-weight: 600;
      }
      .btn.primary {
        border-color: rgba(79, 140, 255, 0.7);
        background: rgba(79, 140, 255, 0.15);
      }
      .btn.danger {
        border-color: rgba(255, 92, 122, 0.7);
        background: rgba(255, 92, 122, 0.15);
      }
      .btn.ghost {
        background: transparent;
      }
      .tabs button {
        margin-right: 8px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }
      th,
      td {
        border-bottom: 1px solid var(--border);
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-weight: 700;
        font-size: 12px;
      }
      .sticky-op {
        position: sticky;
        right: 0;
        z-index: 3;
        background: #111a2d;
        box-shadow: -8px 0 10px rgba(0, 0, 0, 0.18);
      }
      .muted {
        color: var(--muted);
        font-size: 12px;
      }
      .detail-json {
        margin: 0;
        padding: 10px 12px;
        font-size: 11px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 280px;
        overflow: auto;
        background: rgba(0, 0, 0, 0.25);
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .detail-table-wrap {
        overflow-x: auto;
        max-width: 100%;
      }
      .detail-mini-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      .detail-mini-table th,
      .detail-mini-table td {
        border: 1px solid var(--border);
        padding: 6px 8px;
        text-align: left;
        vertical-align: top;
      }
      .detail-mini-table th {
        color: var(--muted);
        font-weight: 600;
      }
      /* 模拟手机外框（小程序预览） */
      .phone-shell {
        width: 320px;
        min-height: 640px;
        border-radius: 32px;
        padding: 10px 10px 18px;
        background: linear-gradient(145deg, #3b82f6, #6366f1);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      .phone-notch {
        height: 12px;
        width: 120px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.35);
        margin: 0 auto 8px;
      }
      .phone-screen {
        flex: 1;
        border-radius: 26px;
        background: #f5f5f7;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .phone-header {
        background: #4f46e5;
        color: #fff;
        padding: 10px 14px 6px;
        font-size: 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .phone-header-title {
        font-size: 14px;
        font-weight: 600;
      }
      .phone-step-tabs {
        display: flex;
        gap: 8px;
        margin-top: 4px;
        font-size: 11px;
      }
      .phone-step-tab {
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.8);
      }
      .phone-step-tab.active {
        background: #fff;
        color: #4f46e5;
        font-weight: 600;
      }
      .phone-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 10px 10px 14px;
      }
      .phone-section {
        background: #ffffff;
        border-radius: 10px;
        padding: 10px 10px 8px;
        margin-bottom: 10px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      }
      .phone-section-title {
        font-size: 12px;
        font-weight: 600;
        color: #111827;
        margin-bottom: 6px;
      }
      .phone-row {
        display: flex;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid #e5e7eb;
        font-size: 11px;
      }
      .phone-row:last-child {
        border-bottom: none;
      }
      .phone-label {
        width: 78px;
        flex-shrink: 0;
        color: #6b7280;
      }
      .phone-value {
        flex: 1;
        color: #111827;
        min-height: 16px;
      }
      .phone-input {
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        font-size: 11px;
        color: #111827;
      }
      .phone-input::placeholder {
        color: #9ca3af;
      }
      .phone-avatar {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        object-fit: cover;
        margin-right: 4px;
      }
      .phone-tag {
        display: inline-flex;
        align-items: center;
        padding: 2px 6px;
        border-radius: 999px;
        background: rgba(79, 70, 229, 0.08);
        color: #4f46e5;
        font-size: 10px;
        margin-left: 4px;
      }
      .phone-card-preview {
        border-radius: 10px;
        padding: 8px 10px;
        background: linear-gradient(135deg, #4338ca, #2563eb);
        color: #e5e7eb;
        font-size: 11px;
        display: flex;
        gap: 8px;
      }
      .phone-card-preview-avatar {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.4);
        object-fit: cover;
        flex-shrink: 0;
      }
      .phone-card-preview-main {
        flex: 1;
      }
      .phone-card-preview-name {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 2px;
      }
      .phone-card-preview-meta {
        font-size: 10px;
        opacity: 0.9;
      }
      .phone-footer {
        padding: 8px 10px 10px;
        border-top: 1px solid rgba(15, 23, 42, 0.06);
        display: flex;
        gap: 8px;
        background: #ffffff;
      }
      .phone-footer-preview {
        flex: 0 0 88px;
        border-radius: 999px;
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        font-size: 11px;
        color: #374151;
      }
      .phone-footer-save {
        flex: 1;
        border-radius: 999px;
        background: linear-gradient(135deg, #4f46e5, #2563eb);
        color: #fff;
        font-size: 12px;
        font-weight: 600;
      }
      .mini-editor-panel {
        margin-left: 12px;
        width: 320px;
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        padding: 12px 14px;
        min-height: 320px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
      }
      .mini-editor-title {
        font-size: 13px;
        font-weight: 600;
        color: #111827;
      }
      .mini-editor-hint {
        font-size: 11px;
        color: #6b7280;
      }
      .mini-editor-field {
        margin-top: 6px;
        font-size: 12px;
        color: #e5e7eb;
      }
      .mini-editor-label {
        display: block;
        margin-bottom: 4px;
        color: var(--muted);
        font-size: 11px;
      }
      .mini-editor-input,
      .mini-editor-textarea,
      .mini-editor-select {
        width: 100%;
        border-radius: 6px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #111827;
        font-size: 12px;
        padding: 6px 8px;
      }
      .mini-editor-textarea {
        min-height: 72px;
        resize: vertical;
      }
      .mini-editor-actions {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 12px;
      }
      .split-wrap {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 12px;
        margin-top: 10px;
      }
      .split-left,
      .split-right {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.01);
        min-height: 520px;
      }
      .split-left {
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .split-left-head {
        display: grid;
        grid-template-columns: 28px 64px 1fr;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
      }
      .split-left-list {
        overflow: auto;
        max-height: 620px;
      }
      .split-left-item {
        display: grid;
        grid-template-columns: 28px 64px 1fr;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }
      .split-left-item.active {
        background: rgba(79, 140, 255, 0.12);
      }
      .detail-wrap {
        padding: 12px;
      }
      .detail-title {
        margin: 0 0 10px 0;
        font-size: 14px;
        color: var(--muted);
      }
      .detail-grid {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 8px 12px;
      }
      .detail-key {
        color: var(--muted);
        font-size: 12px;
      }
      .detail-val {
        font-size: 12px;
        word-break: break-all;
        white-space: pre-wrap;
      }
      .detail-input,
      .detail-select,
      .detail-textarea {
        width: 100%;
        min-height: 28px;
        padding: 6px 8px;
        font-size: 12px;
      }
      .detail-textarea {
        min-height: 56px;
      }
      .avatar-mini {
        width: 14px;
        height: 14px;
        object-fit: cover;
        border-radius: 3px;
        border: 1px solid var(--border);
        vertical-align: middle;
        margin-right: 6px;
      }
      .is-disabled {
        opacity: 0.7;
      }
      .col-6 {
        grid-column: span 6;
      }
      .col-4 {
        grid-column: span 4;
      }
      .col-3 {
        grid-column: span 3;
      }
      .col-12 {
        grid-column: span 12;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal {
        width: 100%;
        max-width: 860px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }
      .modal h3 {
        margin: 0 0 8px 0;
      }
      .spacer {
        flex: 1;
      }
      .small {
        font-size: 12px;
      }
      .pill {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
      }
      .code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
      }
      @media (max-width: 900px) {
        .col-6,
        .col-4,
        .col-3 {
          grid-column: span 12;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" class="wrap"></div>
    <script type="module">
      import {
        createApp,
        ref,
        reactive,
        computed,
        onMounted,
      } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

      const apiBaseDefault = "http://localhost:8000";

      function formatJsonMaybe(v) {
        if (v === undefined || v === null) return "";
        if (typeof v === "string") return v;
        try {
          return JSON.stringify(v, null, 2);
        } catch (e) {
          return String(v);
        }
      }

      async function apiRequest(path, { method = "GET", token = null, params = null, body = null } = {}) {
        const apiBase = localStorage.getItem("tanmai_admin_api_base") || apiBaseDefault;
        const url = new URL(apiBase + path);
        if (params) {
          for (const [k, v] of Object.entries(params)) {
            if (v === undefined || v === null || v === "") continue;
            url.searchParams.set(k, String(v));
          }
        }
        const headers = { "Content-Type": "application/json" };
        if (token) headers["Authorization"] = "Bearer " + token;
        const res = await fetch(url.toString(), {
          method,
          headers,
          body: body ? JSON.stringify(body) : undefined,
        });
        const text = await res.text();
        let data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch {
          data = { raw: text };
        }
        if (!res.ok) {
          const detail = data?.detail || data?.message || data?.error || JSON.stringify(data);
          throw new Error(detail || `HTTP ${res.status}`);
        }
        return data;
      }

      createApp({
        setup() {
          const page = ref("users"); // users | cards | alumni
          const token = ref(localStorage.getItem("tanmai_admin_token") || "");
          const apiBase = ref(localStorage.getItem("tanmai_admin_api_base") || apiBaseDefault);

          const loginCode = ref("");
          const busy = ref(false);
          const message = ref("");

          // Users
          const userKeyword = ref("");
          const userPage = ref(1);
          const userPageSize = ref(200);
          const usersTotal = ref(0);
          const usersItems = ref([]);
          const selectedUserIds = ref([]);
          const activeUserId = ref(null);
          const activeUserDetailTab = ref("raw"); // raw | mini
          const miniEditorType = ref(null); // avatar | locations | resource
          const miniEditorIndex = ref(null);
          const miniEditAvatar = ref("");
          const miniEditLocations = ref([]);
          const miniEditResources = ref([]);

          const userModalOpen = ref(false);
          const editingUserId = ref(null);
          const userViewOpen = ref(false);
          const userViewJson = ref("");
          const activeUserEdit = reactive({
            id: null,
            openid: "",
            name: "",
            nickname: "",
            avatar: "",
            selected_avatar: "",
            work_wechat_id: "",
            wechat_id: "",
            gender: "",
            birth_place: "",
            is_staff: false,
            last_updated_by: null,
            last_updated_role: "",
            field_source: "",
            created_at: "",
            updated_at: "",
            locations: [],
            education: {},
            needs: {},
            resources: [],
            association: {},
            card_entry_step6: {},
            user_cards_summary: [],
            card: {
              id: null,
              user_id: null,
              name: "",
              title: "",
              company: "",
              phone: "",
              email: "",
              bio: "",
              industry: "",
              association_title: "",
              personal_photos: "[]",
              field_visibility: "{}",
              qr_code: "",
              created_at: "",
              updated_at: "",
              last_updated_by: null,
              last_updated_role: "",
              field_source: "",
            },
          });
          const userForm = reactive({
            openid: "",
            name: "",
            nickname: "",
            avatar: "",
            selected_avatar: "",
            work_wechat_id: "",
            gender: "",
            birth_place: "",
            wechat_id: "",
            is_staff: false,
            card_company: "",
            card_title: "",
            card_phone: "",
            card_email: "",
            card_bio: "",
            card_industry: "",
            card_association_title: "",
          });

          // Cards
          const cardKeyword = ref("");
          const cardPage = ref(1);
          const cardPageSize = ref(200);
          const cardsTotal = ref(0);
          const cardsItems = ref([]);
          const selectedCardIds = ref([]);

          const cardModalOpen = ref(false);
          const editingCardId = ref(null);
          const cardForm = reactive({
            user_id: "",
            name: "",
            title: "",
            company: "",
            phone: "",
            email: "",
            bio: "",
            industry: "",
            association_title: "",
            personal_photos: "",
            field_visibility: "",
          });

          // Alumni
          const alumniKeyword = ref("");
          const alumniPage = ref(1);
          const alumniPageSize = ref(200);
          const alumniTotal = ref(0);
          const alumniItems = ref([]);
          const selectedAlumniIds = ref([]);

          const alumniModalOpen = ref(false);
          const editingAlumniId = ref(null);
          const alumniForm = reactive({
            openid: "",
            name: "",
            nickname: "",
            avatar: "",
            selected_avatar: "",
            work_wechat_id: "",
            gender: "",
            birth_place: "",
            wechat_id: "",
            is_staff: false,
            card_company: "",
            card_title: "",
            card_phone: "",
            card_email: "",
            card_bio: "",
            card_industry: "",
            card_association_title: "",
          });

          const isAuthed = computed(() => Boolean(token.value));
          const quickCreateOpen = ref(false);
          const quickCreateType = ref("alumni"); // users | cards | alumni
          const quickCreateForm = reactive({
            openid: "",
            name: "",
            nickname: "",
            gender: "",
            birth_place: "",
            wechat_id: "",
            is_staff: false,
            company: "",
            title: "",
            phone: "",
            email: "",
            bio: "",
            industry: "",
            association_title: "",
            user_id: "",
          });

          function setMessage(s) {
            message.value = s;
            if (!s) return;
            setTimeout(() => {
              if (message.value === s) message.value = "";
            }, 2400);
          }

          function resetUserForm() {
            Object.assign(userForm, {
              openid: "",
              name: "",
              nickname: "",
              avatar: "",
              selected_avatar: "",
              work_wechat_id: "",
              gender: "",
              birth_place: "",
              wechat_id: "",
              is_staff: false,
              card_company: "",
              card_title: "",
              card_phone: "",
              card_email: "",
              card_bio: "",
              card_industry: "",
              card_association_title: "",
            });
          }

          function resetAlumniForm() {
            Object.assign(alumniForm, {
              openid: "",
              name: "",
              nickname: "",
              avatar: "",
              selected_avatar: "",
              work_wechat_id: "",
              gender: "",
              birth_place: "",
              wechat_id: "",
              is_staff: false,
              card_company: "",
              card_title: "",
              card_phone: "",
              card_email: "",
              card_bio: "",
              card_industry: "",
              card_association_title: "",
            });
          }

          function resetCardForm() {
            Object.assign(cardForm, {
              user_id: "",
              name: "",
              title: "",
              company: "",
              phone: "",
              email: "",
              bio: "",
              industry: "",
              association_title: "",
              personal_photos: "",
              field_visibility: "",
            });
          }

          function resetQuickCreateForm() {
            Object.assign(quickCreateForm, {
              openid: "",
              name: "",
              nickname: "",
              gender: "",
              birth_place: "",
              wechat_id: "",
              is_staff: false,
              company: "",
              title: "",
              phone: "",
              email: "",
              bio: "",
              industry: "",
              association_title: "",
              user_id: "",
            });
          }

          function openQuickCreate() {
            quickCreateType.value = page.value === "cards" ? "cards" : page.value === "users" ? "users" : "alumni";
            resetQuickCreateForm();
            quickCreateOpen.value = true;
          }

          async function submitQuickCreate() {
            busy.value = true;
            try {
              if (quickCreateType.value === "cards") {
                const uid = Number(quickCreateForm.user_id);
                if (!uid || uid < 1) throw new Error("创建名片时 user_id 必填");
                await apiRequest("/api/admin/cards", {
                  token: token.value,
                  method: "POST",
                  body: {
                    user_id: uid,
                    payload: {
                      name: quickCreateForm.name || undefined,
                      title: quickCreateForm.title || undefined,
                      company: quickCreateForm.company || undefined,
                      phone: quickCreateForm.phone || undefined,
                      email: quickCreateForm.email || undefined,
                      bio: quickCreateForm.bio || undefined,
                      industry: quickCreateForm.industry || undefined,
                      association_title: quickCreateForm.association_title || undefined,
                    },
                  },
                });
                setMessage("新建名片成功");
              } else if (quickCreateType.value === "users") {
                await apiRequest("/api/admin/users", {
                  token: token.value,
                  method: "POST",
                  body: {
                    user: {
                      openid: quickCreateForm.openid || undefined,
                      name: quickCreateForm.name || undefined,
                      nickname: quickCreateForm.nickname || undefined,
                      gender: quickCreateForm.gender || undefined,
                      birth_place: quickCreateForm.birth_place || undefined,
                      wechat_id: quickCreateForm.wechat_id || undefined,
                      is_staff: quickCreateForm.is_staff,
                    },
                    card: {
                      name: quickCreateForm.name || undefined,
                      title: quickCreateForm.title || undefined,
                      company: quickCreateForm.company || undefined,
                      phone: quickCreateForm.phone || undefined,
                      email: quickCreateForm.email || undefined,
                      bio: quickCreateForm.bio || undefined,
                      industry: quickCreateForm.industry || undefined,
                      association_title: quickCreateForm.association_title || undefined,
                    },
                  },
                });
                setMessage("新建用户记录成功");
              } else {
                await apiRequest("/api/admin/alumni", {
                  token: token.value,
                  method: "POST",
                  body: {
                    user: {
                      openid: quickCreateForm.openid || undefined,
                      name: quickCreateForm.name || undefined,
                      nickname: quickCreateForm.nickname || undefined,
                      gender: quickCreateForm.gender || undefined,
                      birth_place: quickCreateForm.birth_place || undefined,

          async function batchDelete() {
            const ids =
              page.value === "users"
                ? selectedUserIds.value
                : page.value === "cards"
                  ? selectedCardIds.value
                  : selectedAlumniIds.value;
            if (!ids || ids.length === 0) {
              setMessage("未选择任何项");
              return;
            }
            if (!confirm(`确认批量删除 ${page.value}：共 ${ids.length} 条？`)) return;

            busy.value = true;
            try {
              for (const id of ids.slice()) {
                if (page.value === "users") {
                  await apiRequest("/api/admin/users/" + id, { token: token.value, method: "DELETE" });
                } else if (page.value === "cards") {
                  await apiRequest("/api/admin/cards/" + id, { token: token.value, method: "DELETE" });
                } else {
                  await apiRequest("/api/admin/alumni/" + id, { token: token.value, method: "DELETE" });

              clearSelection();
              await refreshCurrentList();
              setMessage("批量删除完成");

                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ code: loginCode.value }),

              if (!res.ok) throw new Error(data?.detail || data?.message || JSON.stringify(data));
              if (!data.token) throw new Error("登录成功但未返回 token");
              token.value = data.token;
              localStorage.setItem("tanmai_admin_token", token.value);
              setMessage("登录成功");

              const isUpdate = editingCardId.value !== null;
              if (isUpdate) {
                await apiRequest("/api/admin/cards/" + editingCardId.value, {
                  token: token.value,
                  method: "PUT",
                  body: cardFormToPayload(true),
                });
                setMessage("更新名片成功");
              } else {
                await apiRequest("/api/admin/cards", {
                  token: token.value,
                  method: "POST",
                  body: cardFormToPayload(false),
                });
                setMessage("保存名片成功");
              }
              cardModalOpen.value = false;
              await loadCards();
            } catch (e) {
              setMessage("保存失败：" + (e?.message || String(e)));
            } finally {
              busy.value = false;
            }
          }

            if (!confirm(`确认删除 cards.id=${item.id}？`)) return;
            busy.value = true;
            try {
              await apiRequest("/api/admin/cards/" + item.id, { token: token.value, method: "DELETE" });
              setMessage("删除成功");
              await loadCards();
            } catch (e) {
              setMessage("删除失败：" + (e?.message || String(e)));
            } finally {
              busy.value = false;
            }
          }

          function pageCount(total, pageSize) {
            if (!total) return 1;
            return Math.max(1, Math.ceil(total / pageSize));
          }

          function pagerGo(kind) {
            if (kind === "prev") {
              if (page.value === "users" && userPage.value > 1) userPage.value--;
              if (page.value === "cards" && cardPage.value > 1) cardPage.value--;
              if (page.value === "alumni" && alumniPage.value > 1) alumniPage.value--;
            } else {
              if (page.value === "users" && userPage.value < pageCount(usersTotal.value, userPageSize.value)) userPage.value++;
              if (page.value === "cards" && cardPage.value < pageCount(cardsTotal.value, cardPageSize.value)) cardPage.value++;
              if (page.value === "alumni" && alumniPage.value < pageCount(alumniTotal.value, alumniPageSize.value)) alumniPage.value++;
            }
            clearSelection();
            refreshCurrentList();
          }
